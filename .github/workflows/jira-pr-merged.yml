name: Finalize Dispatch PR

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'tdf/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HEAD_REF: ${{ github.event.pull_request.head.ref }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract Jira issue key from head ref
        id: extract
        run: |
          shopt -s nocasematch
          if [[ "$HEAD_REF" =~ ^tdf/([a-z][a-z0-9]+-[0-9]+)$ ]]; then
            issue_upper=$(printf '%s' "${BASH_REMATCH[1]}" | tr '[:lower:]' '[:upper:]')
            echo "ISSUE_KEY=$issue_upper" >> "$GITHUB_ENV"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Matched dispatch branch '$HEAD_REF' -> $issue_upper"
          else
            echo "Head ref '$HEAD_REF' does not match tdf/<key>; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Transition Jira ticket to Done
        if: steps.extract.outputs.should_run == 'true'
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node .github/scripts/jira-dispatch.mjs transition-done

      - name: Delete head branch
        if: steps.extract.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PR_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          status=$(curl -sS -o /tmp/delete-branch.body -w '%{http_code}' \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/git/refs/heads/$BRANCH")
          case "$status" in
            200|204)
              echo "Deleted branch '$BRANCH' (HTTP $status)."
              ;;
            422)
              echo "Branch '$BRANCH' already gone (HTTP 422); treating as success."
              ;;
            *)
              echo "::warning::Failed to delete branch '$BRANCH': HTTP $status. Body: $(cat /tmp/delete-branch.body 2>/dev/null || true)"
              ;;
          esac
